name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck (dashboard-only — others compile during build)
        run: pnpm --filter @drift-ci/dashboard typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Upload coverage (core)
        if: matrix.node == '20'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-core
          path: packages/core/coverage
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage (cli)
        if: matrix.node == '20'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-cli
          path: packages/cli/coverage
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage (action)
        if: matrix.node == '20'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-action
          path: packages/action/coverage
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage (dashboard)
        if: matrix.node == '20'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-dashboard
          path: packages/dashboard/coverage
          if-no-files-found: error
          retention-days: 14

      - name: Coverage summary in job output
        if: always() && matrix.node == '20'
        run: |
          echo "## Coverage summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for pkg in core cli action dashboard; do
            f="packages/$pkg/coverage/coverage-summary.json"
            if [ -f "$f" ]; then
              node -e "
                const d = require('./$f').total;
                const pct = (k) => d[k].pct.toFixed(2) + '%';
                console.log('### @drift-ci/$pkg');
                console.log('');
                console.log('| metric | pct |');
                console.log('| --- | --- |');
                console.log('| statements | ' + pct('statements') + ' |');
                console.log('| branches | ' + pct('branches') + ' |');
                console.log('| functions | ' + pct('functions') + ' |');
                console.log('| lines | ' + pct('lines') + ' |');
                console.log('');
              " >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  check-action-bundle:
    name: action bundle is up to date
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core (action build depends on @drift-ci/core)
        run: pnpm --filter @drift-ci/core build

      - name: Rebuild action bundle
        run: pnpm --filter @drift-ci/action build

      - name: Verify bundle is committed
        run: |
          if ! git diff --exit-code packages/action/dist; then
            echo ""
            echo "::error::packages/action/dist is out of sync with src."
            echo "Run \`pnpm --filter @drift-ci/action build\` and commit the result."
            exit 1
          fi
